name: Sync Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, sys

          token = os.environ["SUPABASE_ACCESS_TOKEN"]
          project_ref = "kscsvrvblpntvjajnrit"

          with open("supabase/schema.sql", "r", encoding="utf-8") as f:
              sql = f.read()

          body = json.dumps({"query": sql}).encode("utf-8")
          req = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/{project_ref}/database/query",
              data=body,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              res = urllib.request.urlopen(req)
              print("Success:", res.status)
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print("Error:", e.code, body, file=sys.stderr)
              sys.exit(1)
          EOF
