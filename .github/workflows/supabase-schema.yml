name: Sync Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema to Supabase
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          psql \
            "host=aws-1-ap-northeast-1.pooler.supabase.com \
             port=5432 \
             user=postgres.kscsvrvblpntvjajnrit \
             dbname=postgres \
             sslmode=require" \
            -f supabase/schema.sql
