name: Sync Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema to Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          HOST=$(echo "$DATABASE_URL" | sed 's|.*@||' | sed 's|:.*||')
          IPV4=$(getent ahostsv4 "$HOST" | head -1 | awk '{print $1}')
          FIXED_URL=$(echo "$DATABASE_URL" | sed "s/$HOST/$IPV4/")
          psql "$FIXED_URL" -f supabase/schema.sql
