name: Sync Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply schema to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          supabase link --project-ref kscsvrvblpntvjajnrit --password "$SUPABASE_DB_PASSWORD"
          supabase db query "$(cat supabase/schema.sql)"
