name: Sync Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Apply schema to Supabase
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          python3 << 'EOF'
          import psycopg2, os

          conn = psycopg2.connect(
              host="aws-1-ap-northeast-1.pooler.supabase.com",
              port=5432,
              user="postgres.kscsvrvblpntvjajnrit",
              password=os.environ["SUPABASE_PASSWORD"],
              dbname="postgres",
              connect_timeout=15,
              sslmode="require"
          )
          conn.autocommit = True
          cur = conn.cursor()
          with open("supabase/schema.sql", "r") as f:
              sql = f.read()
          cur.execute(sql)
          conn.close()
          print("Supabase schema sync complete")
          EOF
