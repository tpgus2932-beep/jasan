name: Sync Supabase Schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema to Supabase
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          ENCODED_PWD=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PGPASSWORD'], safe=''))")
          psql "postgresql://postgres.kscsvrvblpntvjajnrit:${ENCODED_PWD}@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -f supabase/schema.sql
